<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tarjeta de Reporte Dinámica</title>
    <style>
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .card {
            background: white;
            width: 350px;
            border-radius: 25px;
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            position: relative;
            transition: transform 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .image-container {
            width: 100%;
            height: 220px;
            background-color: #e0e0e0;
            background-image: url('https://images.unsplash.com/photo-1460925895917-afdab827c52f?q=80&w=500'); /* Imagen por defecto */
            background-size: cover;
            background-position: center;
        }

        .badge {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.95);
            color: #004d3d;
            padding: 6px 16px;
            border-radius: 20px;
            font-weight: 800;
            font-size: 12px;
            text-transform: uppercase;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .content {
            padding: 30px;
        }

        h2 {
            color: #004d3d;
            margin: 0 0 25px 0;
            font-size: 24px;
            font-weight: 700;
        }

        .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        .info-item label {
            display: block;
            color: #7f8c8d;
            text-transform: uppercase;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 1.2px;
            margin-bottom: 4px;
        }

        .info-item span {
            display: block;
            color: #2c3e50;
            font-weight: 700;
            font-size: 16px;
        }

        .btn-download {
            display: block;
            border: 2px solid #004d3d;
            color: #004d3d;
            text-decoration: none;
            text-align: center;
            padding: 14px;
            border-radius: 14px;
            font-weight: 700;
            font-size: 16px;
            transition: all 0.3s ease;
        }

        .btn-download:hover {
            background: #004d3d;
            color: white;
        }

        #status-msg {
            font-size: 10px;
            color: #bdc3c7;
            text-align: center;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="badge">NUEVO</div>
        <div class="image-container" id="card-img"></div>
        
        <div class="content">
            <h2>Reporte por evento</h2>
            
            <div class="info-grid">
                <div class="info-item">
                    <label>Fecha</label>
                    <span id="fecha">--/--/----</span>
                </div>
                <div class="info-item">
                    <label>Hora</label>
                    <span id="hora">--:-- --</span>
                </div>
                <div class="info-item">
                    <label>Tipo</label>
                    <span id="tipo">Cargando...</span>
                </div>
                <div class="info-item">
                    <label>Lugar</label>
                    <span id="lugar">--</span>
                </div>
            </div>

            <a href="#" id="link-pdf" class="btn-download" target="_blank">Descargar PDF</a>
            <div id="status-msg">Sincronizado con Google Sheets</div>
        </div>
    </div>

    <script>
        // TU URL DE GOOGLE SHEETS (IMPORTANTE: Debe terminar en output=csv)
        const sheetURL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vS-1eWSPQS5z6Gvm5AGthQImpUtbtcY5xDGiBTW0I3yU14nlbY9tNNQvq1aPaWir7V2PxwpEJd8UHks/pub?output=csv';

        async function cargarDatos() {
            try {
                const response = await fetch(sheetURL);
                if (!response.ok) throw new Error("No se pudo conectar con el servidor");
                
                const text = await response.text();
                
                // Dividir filas y filtrar las que estén vacías
                const filas = text.split(/\r?\n/).filter(row => row.trim() !== "");
                
                if (filas.length < 2) {
                    document.getElementById('tipo').innerText = "Sin datos en fila 2";
                    return;
                }

                // Tomamos la segunda fila (datos)
                const datos = filas[1].split(',');

                // Inyectar datos en el HTML
                // Orden esperado: A:Fecha, B:Hora, C:Tipo, D:Lugar, E:LinkPDF, F:LinkImagen
                document.getElementById('fecha').innerText = datos[0] || '--';
                document.getElementById('hora').innerText  = datos[1] || '--';
                document.getElementById('tipo').innerText  = datos[2] || 'Evento';
                document.getElementById('lugar').innerText = datos[3] || 'N/A';
                document.getElementById('link-pdf').href   = datos[4] ? datos[4].trim() : '#';
                
                // Imagen dinámica
                if (datos[5] && datos[5].includes('http')) {
                    document.getElementById('card-img').style.backgroundImage = `url('${datos[5].trim()}')`;
                }

            } catch (error) {
                console.error("Error al cargar:", error);
                document.getElementById('tipo').innerText = "Error de conexión";
                document.getElementById('status-msg').innerText = "Verifica la publicación del Sheet.";
            }
        }

        // Ejecutar al abrir
        cargarDatos();
    </script>
</body>
</html>
