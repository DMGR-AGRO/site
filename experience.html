<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consulta Experience Builder - CMG</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00452e; /* Verde Agroasemex */
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text-muted: #64748b;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: var(--bg);
        }

        .report-card {
            background: var(--card-bg);
            width: 320px;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s ease;
            position: relative;
        }

        .report-card:hover {
            transform: translateY(-8px);
        }

        .img-container {
            width: 100%;
            height: 200px;
            overflow: hidden;
            background-color: #e2e8f0;
        }

        .img-container img {
            width: 100%;
            height: 100%;
            display: block;
            object-fit: cover;
            transition: transform 0.5s ease;
        }

        .report-card:hover .img-container img {
            transform: scale(1.05);
        }

        .badge {
            position: absolute;
            top: 15px;
            right: 15px;
            background: rgba(255, 255, 255, 0.95);
            padding: 6px 12px;
            border-radius: 12px;
            font-size: 0.7rem;
            font-weight: 800;
            color: var(--primary);
            text-transform: uppercase;
            backdrop-filter: blur(4px);
            z-index: 10;
        }

        .content { 
            padding: 24px; 
            text-align: center;
        }

        .description {
            font-size: 0.85rem;
            color: var(--text-muted);
            line-height: 1.5;
            margin-bottom: 20px;
            font-weight: 400;
        }

        .description strong {
            color: var(--primary);
            font-weight: 700;
        }

        .download-link {
            display: block;
            padding: 14px;
            background: transparent;
            border: 2px solid var(--primary);
            color: var(--primary);
            text-decoration: none;
            border-radius: 16px;
            font-weight: 800;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            transition: all 0.3s ease;
        }

        .report-card:hover .download-link {
            background: var(--primary);
            color: white;
        }
    </style>
</head>
<body>

    <article class="report-card">
        <span class="badge">Monitoreo</span>
        <div class="img-container">
            <img src="experience2.png" alt="Visualización de datos">
        </div>
        
        <div class="content">
            <p class="description">
                Desde este apartado podrá visualizar los <strong>datos de consulta</strong> y análisis espacial generados mediante el widget de <strong>Experience Builder</strong>.
            </p>
            <a href="TU_LINK_DE_DRIVE_AQUÍ" class="download-link" target="_blank">Abrir </a>
        </div>
    </article>

</body>
</html>
